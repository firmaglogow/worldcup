name: Automatyczna aktualizacja wyników

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-match-center
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pobierz bezpłatne wyniki
        run: node scripts/update-match-center.mjs

      - name: Zsynchronizuj wyniki Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-supabase-results.mjs

      - name: Zapisz nowe dane
        run: |
          if git diff --quiet -- data/match-center.json assets/match-center-data.js index.html match.html; then
            echo "Brak nowych danych."
            exit 0
          fi
          git config user.name "worldcup-results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/match-center.json assets/match-center-data.js index.html match.html
          git commit -m "Automatyczna aktualizacja wyników"
          git push
